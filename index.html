<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>littleGenius Metaverse</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: url("./littleGenius.png") no-repeat center center fixed;
      background-size: cover;
      font-family: 'Arial', 'Helvetica', sans-serif;
      color: white;
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      margin: 40px 0 20px;
      text-shadow: 0 6px 15px rgba(0,0,0,0.6);
    }
    .apps {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin: 20px 0 60px;
    }
    .app {
      width: 200px;
      height: 200px;
      border: 3px solid #ffd700;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: rgba(0, 0, 0, 0.4);
    }
    .app img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .app:hover {
      transform: translateY(-10px);
      box-shadow: 0 8px 20px rgba(255, 215, 0, 0.5);
    }
    .footer {
      margin-top: auto;
      padding: 20px;
      font-size: 1rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <h1>Welcome to littleGenius Metaverse</h1>

  <div class="apps">
    <a href="https://geniusmetaverse-max.github.io/geniusmetaverse/magicmirror/" class="app">
      <img src="Magic%20Mirror.png" alt="Magic Mirror">
    </a>
    <a href="https://geniusmetaverse-max.github.io/geniusmetaverse/wordlegend/" class="app">
      <img src="Word%20Legend.png" alt="Word Legend">
    </a>
    <a href="https://geniusmetaverse-max.github.io/geniusmetaverse/reflex/" class="app">
      <img src="Reflex.png" alt="Reflex">
    </a>
  </div>

  <div class="footer">
    © 2026 littleGenius Metaverse • All rights reserved
  </div>

</body>
</html>
